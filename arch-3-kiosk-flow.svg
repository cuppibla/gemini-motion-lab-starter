<text x="551" y="52" text-anchor="middle" font-size="10" fill="#9E9E9E">30-min idle → auto-reset (RESET)</text>
<rect x="860" y="278" width="265" height="140" rx="8" fill="#4A148C" fill-opacity="0.12" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="992" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#E1BEE7">Queue System (server-side)</text>
<text x="870" y="318" font-size="10" fill="#CE93D8">• _active_jobs: set[str]  |  MAX_CONCURRENT=3</text>
<text x="870" y="335" font-size="10" fill="#CE93D8">• register(video_id)  called when Veo starts</text>
<text x="870" y="352" font-size="10" fill="#CE93D8">• complete(video_id)  called when pipeline done</text>
<text x="870" y="369" font-size="10" fill="#CE93D8">• GET /api/queue/status →</text>
<text x="880" y="385" font-size="10" fill="#CE93D8">{ active_jobs, max_jobs, available }</text>
<text x="870" y="402" font-size="10" fill="#CE93D8">• kiosk polls after each session completes</text>
