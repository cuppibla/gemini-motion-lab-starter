<rect x="670" y="82" width="520" height="115" rx="8" fill="#263238" fill-opacity="0.4" stroke="#455A64" stroke-width="1.5"/>
<text x="930" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#CFD8DC">Action Buttons (shown when stage=ready)</text>
<rect x="680" y="108" width="170" height="18" rx="9" fill="#4285F4" fill-opacity="0.7"/>
<text x="765" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Save Video</text>
<text x="860" y="120" font-size="10" fill="#B0BEC5">download composed.mp4  (GCS signed URL, 24hr)</text>
<rect x="680" y="130" width="170" height="18" rx="9" fill="#546E7A" fill-opacity="0.7"/>
<text x="765" y="142" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Save Avatar Image</text>
<text x="860" y="142" font-size="10" fill="#B0BEC5">download avatar.png  (GCS signed URL)</text>
<rect x="680" y="152" width="170" height="18" rx="9" fill="#0D47A1" fill-opacity="0.7"/>
<text x="765" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Add to Google Wallet</text>
<text x="860" y="164" font-size="10" fill="#B0BEC5">→ calls /api/share/{id}/wallet</text>
<rect x="680" y="174" width="170" height="18" rx="9" fill="#212121" fill-opacity="0.7"/>
<text x="765" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Add to Apple Wallet</text>
<text x="860" y="186" font-size="10" fill="#B0BEC5">→ calls /api/share/{id}/apple-wallet</text>
<rect x="670" y="210" width="520" height="210" rx="8" fill="#0D47A1" fill-opacity="0.12" stroke="#1565C0" stroke-width="1.5"/>
<text x="930" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#90CAF9">Google Wallet Flow</text>
<text x="930" y="250" text-anchor="middle" font-size="11" fill="#64B5F6">GET /api/share/{id}/wallet</text>
<text x="682" y="268" font-size="9" fill="#90CAF9">1. Check avatar exists (GCS: avatars/{id}.png)</text>
<text x="682" y="284" font-size="9" fill="#90CAF9">2. Compose hero banner (1032×336) via Pillow:</text>
<text x="682" y="300" font-size="9" fill="#90CAF9">   gradient bg + circular avatar + "Gemini Motion Lab" text</text>
<text x="682" y="316" font-size="9" fill="#90CAF9">3. Upload hero banner → GCS: avatars/{id}_wallet_hero.png</text>
<text x="682" y="332" font-size="9" fill="#90CAF9">4. Generate signed URLs: avatar (24hr) + hero (24hr)</text>
<text x="682" y="348" font-size="9" fill="#90CAF9">5. Build JWT payload: GenericClass + GenericObject</text>
<text x="682" y="364" font-size="9" fill="#90CAF9">   barcode: QR linking to /share/{id}  |  hexBg: #1a237e</text>
<text x="682" y="380" font-size="9" fill="#90CAF9">6. Sign JWT RS256 with Google Wallet SA private key</text>
<text x="682" y="396" font-size="9" fill="#90CAF9">7. Return: {"wallet_url":"https://pay.google.com/gp/v/save/{jwt}"}</text>
<text x="682" y="412" font-size="9" fill="#90CAF9">8. Mobile browser redirected → Google Wallet "Save" UI</text>
<rect x="670" y="432" width="520" height="220" rx="8" fill="#212121" fill-opacity="0.4" stroke="#757575" stroke-width="1.5"/>
<text x="930" y="454" text-anchor="middle" font-size="13" font-weight="bold" fill="#E0E0E0">Apple Wallet Flow</text>
<text x="930" y="472" text-anchor="middle" font-size="11" fill="#BDBDBD">GET /api/share/{id}/apple-wallet</text>
<text x="682" y="490" font-size="9" fill="#BDBDBD">1. Check avatar exists (GCS: avatars/{id}.png)</text>
<text x="682" y="506" font-size="9" fill="#BDBDBD">2. Download avatar PNG bytes</text>
<text x="682" y="522" font-size="9" fill="#BDBDBD">3. Resize to icon sizes: 29×29, 58×58, 87×87, 90×90, 180×180</text>
<text x="682" y="538" font-size="9" fill="#BDBDBD">4. Build pass.json: Generic pass, QR barcode → /share/{id}</text>
<text x="682" y="554" font-size="9" fill="#BDBDBD">5. Build manifest.json: SHA1 hash of every file</text>
<text x="682" y="570" font-size="9" fill="#BDBDBD">6. Load Apple certs from Secret Manager mounts:</text>
<text x="682" y="586" font-size="9" fill="#BDBDBD">   pass_cert.pem + pass_key.pem + wwdr.pem</text>
<text x="682" y="602" font-size="9" fill="#BDBDBD">7. Create PKCS#7 detached signature (DER) of manifest</text>
<text x="682" y="618" font-size="9" fill="#BDBDBD">8. ZIP all files → .pkpass archive</text>
<text x="682" y="634" font-size="9" fill="#BDBDBD">9. Return: Content-Type: application/vnd.apple.pkpass</text>
<text x="682" y="650" font-size="9" fill="#BDBDBD">10. iOS auto-opens → Apple Wallet "Add Pass" UI</text>
