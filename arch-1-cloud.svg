<text x="700" y="452" text-anchor="middle" font-size="10" fill="#E3F2FD">pipeline (asyncio)</text>
<text x="228" y="460" font-size="10" fill="#A5D6A7">Queue: in-memory set, max 3 concurrent Veo jobs  |  register() on Veo start, complete() on pipeline finish</text>
<text x="228" y="476" font-size="10" fill="#A5D6A7">Pipeline: poll Veo (5s interval) → ffmpeg trim 3s → compose side-by-side → GCS upload → release slot</text>
<text x="228" y="492" font-size="10" fill="#81C784">MOCK_AI=false  |  GOOGLE_GENAI_USE_VERTEXAI=true  |  GCS_BUCKET=gemini-motion-lab</text>
<text x="228" y="508" font-size="10" fill="#81C784">Secrets: 5 Secret Manager mounts (Apple certs ×3, WWDR cert, Google Wallet SA key)</text>
<text x="228" y="524" font-size="10" fill="#66BB6A">Wallet: generates Google Wallet JWT (RS256 signed) + Apple .pkpass (PKCS#7 signed ZIP)</text>
