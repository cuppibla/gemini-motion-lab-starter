<text x="579" y="312" font-size="9" fill="#EF9A9A">① POST /upload → video_id</text>
<text x="579" y="330" font-size="9" fill="#EF9A9A">② SSE /analyze → JSON + frame</text>
<text x="579" y="348" font-size="9" fill="#EF9A9A">③ POST /gen-avatar → PNG</text>
<text x="579" y="366" font-size="9" fill="#EF9A9A">④ POST /gen-video → op_id</text>
<text x="579" y="384" font-size="9" fill="#EF9A9A">⑤ Shows QR + "Veo running"</text>
